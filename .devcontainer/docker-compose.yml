version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev-environment
    command: tail -f /dev/null
    volumes:
      - ..:/workspace
      - /workspace/node_modules
      - /workspace/target
    ports:
      - "3000:3000"    # React development server
      - "8080:8080"    # Java application
      - "8888:8888"    # Alternative port
    environment:
      - NODE_ENV=development
      - JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8
    depends_on:
      - postgres
    networks:
      - dev-network

  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  dev-network:
    driver: bridge
